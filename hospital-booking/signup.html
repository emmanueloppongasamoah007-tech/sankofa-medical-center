<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Sankofa Medical Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/signup.css" />
</head>
<body class="auth-page">

  <!-- LEFT: white form panel -->
  <div class="auth-left">
    <div class="auth-form-wrap">

      <h1>Get Started Now</h1>
      <p class="auth-subtitle">Create your account to book appointments online.</p>

      <!-- Error banner -->
      <div class="auth-banner auth-banner--error" id="error-banner">
        <span id="error-msg">Please fix the errors below.</span>
      </div>

      <form id="signup-form" novalidate>

        <div class="field-group">
          <label for="su-name">Full Name</label>
          <input type="text" id="su-name" name="name" placeholder="Enter your full name" autocomplete="name" />
        </div>

        <div class="field-group">
          <label for="su-email">Email Address</label>
          <input type="email" id="su-email" name="email" placeholder="Enter your email" autocomplete="email" />
        </div>

        <div class="field-group">
          <label for="su-phone">Phone Number</label>
          <input type="tel" id="su-phone" name="phone" placeholder="10-digit phone number" autocomplete="tel" />
        </div>

        <div class="field-group">
          <label for="su-password">Password</label>
          <input type="password" id="su-password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" />
          <!-- Password strength meter -->
          <div class="pwd-strength" id="pwd-strength">
            <div class="pwd-strength-bar">
              <div class="pwd-strength-fill" id="pwd-strength-fill"></div>
            </div>
            <span class="pwd-strength-label" id="pwd-strength-label"></span>
          </div>
        </div>

        <div class="field-group">
          <label for="su-confirm">Confirm Password</label>
          <input type="password" id="su-confirm" name="confirm" placeholder="Re-enter your password" autocomplete="new-password" />
        </div>

        <button type="submit" class="auth-submit">Create Account</button>

      </form>

      <div class="auth-divider">or</div>

      <div class="auth-links">
        <p>Already have an account? <a href="login.html">Sign In</a></p>
      </div>

    </div>
  </div><!-- /.auth-left -->

  <!-- RIGHT: deep blue illustration panel -->
  <div class="auth-right">
    <div class="auth-illus-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" fill="none">
        <circle cx="120" cy="132" r="90" fill="rgba(255,255,255,0.04)"/>
        <circle cx="120" cy="62" r="26" fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
        <path d="M95 56 Q95 38 120 38 Q145 38 145 56 L143 50 Q137 35 120 35 Q103 35 97 50 Z" fill="rgba(255,255,255,0.25)"/>
        <path d="M85 110 Q85 97 120 97 Q155 97 155 110 L158 186 H82 Z" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
        <path d="M108 97 L113 122 L120 117 L127 122 L132 97" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linejoin="round"/>
        <rect x="116" y="110" width="9" height="3" rx="1.5" fill="rgba(255,255,255,0.9)"/>
        <rect x="119" y="107" width="3" height="9" rx="1.5" fill="rgba(255,255,255,0.9)"/>
        <path d="M97 118 Q83 125 81 141 Q79 158 91 164 Q103 170 108 160 Q112 150 105 144" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="105" cy="144" r="7" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>
        <circle cx="105" cy="144" r="3" fill="rgba(255,255,255,0.25)"/>
        <rect x="133" y="112" width="30" height="40" rx="4" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.38)" stroke-width="1.5"/>
        <rect x="141" y="106" width="14" height="8" rx="3" fill="rgba(255,255,255,0.28)" stroke="rgba(255,255,255,0.38)" stroke-width="1"/>
        <rect x="138" y="120" width="20" height="2.5" rx="1" fill="rgba(255,255,255,0.55)"/>
        <rect x="138" y="127" width="16" height="2.5" rx="1" fill="rgba(255,255,255,0.38)"/>
        <rect x="138" y="133" width="18" height="2.5" rx="1" fill="rgba(255,255,255,0.38)"/>
        <rect x="138" y="139" width="12" height="2.5" rx="1" fill="rgba(255,255,255,0.28)"/>
        <rect x="92" y="184" width="20" height="52" rx="9" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.38)" stroke-width="1.5"/>
        <rect x="128" y="184" width="20" height="52" rx="9" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.38)" stroke-width="1.5"/>
        <ellipse cx="102" cy="239" rx="14" ry="7" fill="rgba(255,255,255,0.17)"/>
        <ellipse cx="138" cy="239" rx="14" ry="7" fill="rgba(255,255,255,0.17)"/>
        <path d="M18 258 L52 258 L60 242 L68 268 L76 247 L84 258 L222 258" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="36" cy="90" r="5" fill="rgba(255,255,255,0.12)"/>
        <circle cx="50" cy="64" r="3.5" fill="rgba(255,255,255,0.09)"/>
        <circle cx="200" cy="86" r="4.5" fill="rgba(255,255,255,0.12)"/>
        <circle cx="186" cy="60" r="3" fill="rgba(255,255,255,0.09)"/>
        <rect x="194" y="108" width="26" height="8" rx="4" fill="rgba(255,255,255,0.18)"/>
        <rect x="203" y="99" width="8" height="26" rx="4" fill="rgba(255,255,255,0.18)"/>
      </svg>
    </div>
    <div class="auth-right-brand">
      <span class="auth-right-brand-name">🏥 Sankofa Medical Center</span>
      <span class="auth-right-brand-sub">Your Health, Our Priority</span>
    </div>
  </div><!-- /.auth-right -->

  <script>
    // ── Password strength meter ──
    document.getElementById('su-password').addEventListener('input', function () {
      const val = this.value;
      const meter = document.getElementById('pwd-strength');
      const fill  = document.getElementById('pwd-strength-fill');
      const label = document.getElementById('pwd-strength-label');

      if (!val) { meter.classList.remove('visible'); return; }
      meter.classList.add('visible');

      fill.className = 'pwd-strength-fill';
      label.className = 'pwd-strength-label';

      if (val.length < 6) {
        fill.classList.add('weak');  label.classList.add('weak');  label.textContent = 'Weak';
      } else if (val.length < 10 || !/[^a-zA-Z0-9]/.test(val)) {
        fill.classList.add('fair');  label.classList.add('fair');  label.textContent = 'Fair';
      } else {
        fill.classList.add('strong'); label.classList.add('strong'); label.textContent = 'Strong';
      }
    });

    // ── Helpers ──
    function getUsers() {
      return JSON.parse(localStorage.getItem('sm_users') || '[]');
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-banner').classList.add('visible');
    }
    function hideError() {
      document.getElementById('error-banner').classList.remove('visible');
    }

    function markError(id) {
      document.getElementById(id).classList.add('input-error');
    }
    function clearErrors() {
      document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
      hideError();
    }

    // ── Form submit ──
    document.getElementById('signup-form').addEventListener('submit', function (e) {
      e.preventDefault();
      clearErrors();

      const name     = document.getElementById('su-name').value.trim();
      const email    = document.getElementById('su-email').value.trim();
      const phone    = document.getElementById('su-phone').value.trim();
      const password = document.getElementById('su-password').value;
      const confirm  = document.getElementById('su-confirm').value;

      // Validate name (at least 2 words)
      if (name.split(' ').filter(Boolean).length < 2) {
        markError('su-name');
        showError('Please enter your full name (first and last).');
        return;
      }

      // Validate email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        markError('su-email');
        showError('Please enter a valid email address.');
        return;
      }

      // Validate phone (10 digits)
      if (!/^\d{10}$/.test(phone)) {
        markError('su-phone');
        showError('Phone number must be exactly 10 digits.');
        return;
      }

      // Validate password length
      if (password.length < 8) {
        markError('su-password');
        showError('Password must be at least 8 characters.');
        return;
      }

      // Validate confirm password
      if (password !== confirm) {
        markError('su-confirm');
        showError('Passwords do not match.');
        return;
      }

      // Check for duplicate email
      const users = getUsers();
      if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
        markError('su-email');
        showError('An account with this email already exists.');
        return;
      }

      // Save and redirect
      users.push({ name, email, phone, password });
      localStorage.setItem('sm_users', JSON.stringify(users));
      window.location.href = 'login.html?registered=1';
    });
  </script>
</body>
</html>
